# ============================================================
# Margin of Error — Economic Assumptions
# Version: 0.1.0  |  All PLACEHOLDER values must be reviewed
# before Phase 2 analysis. Search for "PLACEHOLDER" to find them.
# Sources are stated estimates unless a citation is given.
# ============================================================

transaction:
  # Buyer-side closing costs (title, escrow, inspection, origination fees)
  # Rationale: typical range 0.5–2%; 1% is a conservative mid-point.
  # Source: stated estimate; varies by state and lender.
  buy_side_pct: 0.01

  # Total agent commission (buyer + seller sides, paid by seller at close)
  # Rationale: traditional 6% split; declining in some markets post-2024 NAR settlement.
  # Source: NAR historical average; flag for sensitivity analysis.
  sell_side_pct: 0.06

holding:
  # Monthly carry cost as a fraction of purchase price
  # Includes: property taxes, hazard insurance, utilities, basic maintenance
  # Rationale: ~6% annual cost / 12 months = 0.5% per month [PLACEHOLDER — Iowa-specific taxes
  #            run ~1.5% annually; adjust when we have county data]
  monthly_cost_pct: 0.005   # PLACEHOLDER

  # Expected project duration from acquisition to resale closing
  # Rationale: 6 months is industry rule-of-thumb for light-to-medium renovations.
  # Source: stated assumption; should be calibrated to local permit timelines.
  typical_hold_months: 6    # PLACEHOLDER

financing:
  # Annual interest rate on hard-money / bridge acquisition loan
  # Rationale: U.S. hard-money rates ranged 9–13% in 2023–2024; 10% is mid-range.
  # Source: stated estimate. In the Ames dataset era (2006–2010) rates were lower; Phase 4
  #         backtest should use a time-varying rate series.
  hard_money_rate: 0.10     # PLACEHOLDER — use time-series for Phase 4

  # Loan-to-value ratio at acquisition
  # Rationale: hard-money lenders typically lend 65–80% of purchase price.
  # 80% is the optimistic end; use 70% for conservative sensitivity case.
  ltv: 0.80                 # PLACEHOLDER

renovation:
  # Cost estimates for renovatable features in the Ames dataset.
  # Source: Remodeling Magazine Cost vs. Value Report 2023 (national averages).
  # CRITICAL PLACEHOLDER: All figures are national averages. Iowa labor and material
  # costs are typically 10–25% below national; adjust before production use.
  kitchen_minor_remodel_usd: 27000    # [Remodeling Mag 2023 national avg — PLACEHOLDER]
  bath_addition_usd: 49000            # Full bathroom addition [PLACEHOLDER]
  bath_remodel_usd: 11000             # Minor bath remodel [PLACEHOLDER]
  basement_finish_per_sqft_usd: 35    # Wide range: $25–75/sqft [PLACEHOLDER]
  treatment_costs_usd:
    # Phase 3 decision-matrix costs. These reuse the Phase 2 placeholder cost
    # basis above and the existing renovation-tier budgets; they are not causal
    # findings and should be swept in Phase 5 sensitivity.
    KitchenQual_per_step: 27000
    BsmtFinType1_per_step: 25000
    HeatingQC_per_step: 8000
    FireplaceQu_per_step: 8000
    GarageFinish_per_step: 8000
    ExterQual_per_step: 25000
    FullBath_per_unit: 49000
    HalfBath_per_unit: 11000
    BsmtFullBath_per_unit: 49000

profit:
  # Minimum net profit (after all costs) required to recommend underwriting.
  # Both criteria must be met; whichever is more restrictive applies.

  # Minimum as a fraction of After-Repair Value (ARV)
  # Rationale: 10% margin of ARV leaves headroom for cost overruns and market moves.
  # Source: stated assumption; industry "70% rule" implies ~30% gross, but that's pre-cost.
  minimum_margin_pct: 0.10  # PLACEHOLDER — subject to sensitivity analysis in Phase 2

  # Absolute floor regardless of percentage (protects against tiny-deal edge cases)
  # Rationale: $20k net profit is roughly the minimum that compensates for opportunity cost.
  # Source: stated assumption.
  min_absolute_usd: 20000   # PLACEHOLDER

# ============================================================
# Phase 2 fix-and-flip economics (profit Monte Carlo + decision rule)
# Self-contained: every number the Phase 2 simulation/underwriter needs lives
# here. See docs/assumptions.md for the documented basis of each value.
# ============================================================
flip:
  # Acquisition price model for the dataset-wide pass: the standard flip
  # "70% rule" — Maximum Allowable Offer = factor * ARV - renovation cost.
  # This sets a purchase price that targets ~30% of ARV as gross margin before
  # transaction/holding costs. The investor buys below the model's predicted
  # value; whether the model's UNCERTAINTY still fits inside that margin is the
  # whole question of Phase 2. See docs/decisions.md § ADR-012.
  acquisition_arv_factor: 0.70   # PLACEHOLDER — industry "70% rule"

  # Round-trip transaction cost as a fraction of PURCHASE PRICE.
  # Rationale: ~6% covers selling agent commission + transfer taxes + closing.
  # Industry estimate (iBuyer disclosures, NAR). Applied per the Phase 2 brief's
  # profit formula. Flagged for Phase 5 sensitivity.
  transaction_cost_pct: 0.06     # PLACEHOLDER — industry estimate

  # Monthly carry cost as a fraction of purchase price.
  # Components: property tax + hazard insurance + utilities + maintenance + opportunity.
  # Rationale: ~0.8%/month. Cash deal (financing_assumption: cash) so no debt carry.
  holding_cost_monthly_pct: 0.008  # PLACEHOLDER

  # Holding period is modeled as a TRUNCATED NORMAL, not a point value: flips
  # rarely close exactly on schedule. base/std define the distribution; min/max truncate.
  holding_period_months_base: 4    # expected hold (assumption; range ~2–8 months)
  holding_period_months_std: 1.5   # dispersion of hold duration
  holding_period_months_min: 1     # truncation floor
  holding_period_months_max: 12    # truncation cap

  # Capital structure. cash = no leverage (cleanest for a portfolio project).
  # Leverage would amplify both return and downside risk; modeled as a Phase 5 case.
  financing_assumption: cash

  # Monte Carlo draws per property per renovation tier (summary stats stored, not draws).
  monte_carlo_samples: 10000

  # Converts a 90% CQR interval half-width to a working Normal std for ARV sampling:
  #   std = (U - L) / (2 * arv_normal_z).  1.645 = z_{0.95}. Acknowledged simplification.
  arv_normal_z: 1.645

  # Renovation tiers: cost to execute and assumed ARV uplift (conservative PRIORS).
  # Basis: HomeAdvisor / Remodeling Magazine ranges (national). Phase 3 replaces the
  # uplift priors with data-derived causal estimates — these are NOT findings.
  renovation_tiers:
    minimal:
      cost_usd: 8000
      value_uplift_pct: 0.04
      scope: "Cosmetic — paint, fixtures, landscaping, minor repairs"
    moderate:
      cost_usd: 25000
      value_uplift_pct: 0.10
      scope: "Kitchen/bath refresh, flooring, lighting"
    substantial:
      cost_usd: 60000
      value_uplift_pct: 0.18
      scope: "Structural, full kitchen/bath gut, HVAC, systems"

  # Phase 3 causal uplift mode. `value_uplift_pct` above is the Phase 2
  # correlational prior; the DML values below are populated by
  # `python -m margin_of_error.causal.dml` and can be summed by tier.
  use_causal_uplifts: true
  causal_renovation_uplifts:
    KitchenQual_per_step: 4450.30
    BsmtFinType1_per_step: 2428.54
    HeatingQC_per_step: 1547.93
    FireplaceQu_per_step: 1698.60
    GarageFinish_per_step: 3524.19
    ExterQual_per_step: 5633.52
    FullBath_per_unit: 2491.79
    HalfBath_per_unit: 2480.85
    BsmtFullBath_per_unit: 8519.86
  causal_tier_uplift_features:
    minimal:
      - HeatingQC_per_step
      - FireplaceQu_per_step
      - GarageFinish_per_step
    moderate:
      - KitchenQual_per_step
      - HalfBath_per_unit
      - ExterQual_per_step
    substantial:
      - KitchenQual_per_step
      - FullBath_per_unit
      - BsmtFullBath_per_unit
      - BsmtFinType1_per_step
      - GarageFinish_per_step

  underwriting:
    # A flip is only underwritable when expected margin clears the model's own
    # uncertainty by a meaningful buffer. See docs/decisions.md § ADR-013.
    minimum_underwrite_margin_buffer_usd: 15000  # profit floor for P(profit > buffer)
    max_acceptable_interval_width_usd: 60000     # if the model is this unsure, DECLINE
    approve_prob_above_min_margin: 0.65          # APPROVE needs >=65% chance of clearing buffer
    approve_prob_loss_max: 0.20                  # ...and <=20% chance of a loss
    refer_prob_above_min_margin: 0.50            # REFER needs >=50% chance of clearing buffer
    refer_prob_loss_max: 0.30                    # ...and <=30% chance of a loss
