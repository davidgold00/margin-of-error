# ============================================================
# Margin of Error — Model Configuration
# Version: 0.1.0
# All seeds and splits are fixed for reproducibility.
# To change any value, update here and re-run from scratch.
# ============================================================

global_seed: 42

data:
  kaggle_train_path: data/raw/kaggle/train.csv
  kaggle_test_path: data/raw/kaggle/test.csv
  ames_full_path: data/raw/ames/AmesHousing.csv
  description_path: data/raw/ames/data_description.txt

cross_validation:
  n_folds: 5
  # Stratify folds by Neighborhood to prevent spatial leakage across folds.
  # Decision note: pure random folds risk putting all sales from a single
  # neighborhood into one fold, making OOF predictions implicitly spatially
  # extrapolated. Neighborhood stratification is a lightweight but meaningful
  # mitigation. Full spatial CV (e.g., block-group hold-out) is logged as backlog.
  stratify_by: Neighborhood

phase1:
  cv_repeats: 3
  inner_cv_folds: 3
  early_stopping_validation_fraction: 0.15
  artifact_dir: models/phase1
  metric_card_path: reports/phase1_metric_card.json
  residuals_path: reports/phase1_oof_residuals.csv
  random_split_note: "Kaggle train.csv is a random cross-sectional split; Phase 1 validation does not test temporal regime robustness."

  elastic_net:
    alpha_grid: [0.0005, 0.001, 0.003, 0.01, 0.03]
    l1_ratio_grid: [0.1, 0.5, 0.9]
    max_iter: 20000

  lightgbm_tuning:
    # Nested inside the outer repeated CV folds. These are intentionally compact:
    # the Ames training set is small, and Phase 1 needs honest OOF residuals more
    # than an exhaustive leaderboard search.
    num_leaves_grid: [31, 63]
    min_child_samples_grid: [10, 20]
    reg_lambda_grid: [0.5, 1.0, 2.0]

target:
  column: SalePrice
  # log1p transform stabilizes variance (SalePrice is right-skewed) and
  # ensures percent errors are symmetric. Remember to expm1() before reporting
  # dollar figures or computing P&L.
  transform: log1p

conformal:
  # 1 - alpha = nominal coverage guarantee for prediction intervals.
  # alpha: 0.10 → 90% intervals (primary). We also report 80% (secondary_alpha).
  alpha: 0.10
  secondary_alpha: 0.20

  # Three-way split of the 1,460 labeled rows (see docs/decisions.md § ADR-010):
  #   train  = 1 - calibration_split - test_split  (fit the quantile models)
  #   calib  = calibration_split                    (compute conformal correction Q̂)
  #   test   = test_split                           (evaluate coverage + width)
  # 0.15 of 1460 ≈ 219 calibration rows — stable empirical quantiles at α = 0.10.
  # 0.20 of 1460 ≈ 292 test rows — never touched during fit or calibration.
  calibration_split: 0.15
  test_split: 0.20

lightgbm:
  n_estimators: 1000
  learning_rate: 0.05
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  early_stopping_rounds: 50

quantile:
  # Quantile targets for the lower and upper arms of the CQR model.
  # These are deliberately inside the final alpha/2 tails because the
  # conformal step will expand them to achieve exact finite-sample coverage.
  lower_alpha: 0.05
  upper_alpha: 0.95

features:
  # Columns to drop before any modeling.
  # SaleType / SaleCondition are sale-specific, not property-specific (leakage risk).
  # YrSold / MoSold are used only in the Phase 4 backtest pipeline, not in cross-section.
  drop:
    - Id
    - SalePrice
    - SaleType
    - SaleCondition
    - YrSold
    - MoSold

# ============================================================
# Phase 4 — walk-forward crash backtest (methodology only).
# NOTE: every ECONOMIC parameter (70% rule, transaction/holding costs,
# underwriting thresholds) is reused from config/economics.yaml `flip`.
# This block only holds walk-forward *methodology* knobs. See docs/decisions.md.
# ============================================================
backtest:
  # First sale-year to underwrite. Earlier years are training warm-up only, so the
  # first model generation is trained purely on pre-eval_start_year data.
  eval_start_year: 2007
  # Model refresh cadence. 'annual' retrains once per calendar year on all sales
  # strictly before that year (expanding window); 'monthly' retrains every month.
  # Annual is the default: 4 deterministic generations, fast, and the crash spans
  # whole years so annual granularity captures the regime shift cleanly.
  retrain_frequency: annual
  # Fraction of the (past-only) training pool held out to compute the conformal
  # correction Q̂ at each retrain. The remainder fits the quantile arms.
  calibration_fraction: 0.20
  # Minimum number of past rows required before the first prediction is allowed.
  # 2006 alone (~625 rows) clears this, so evaluation can start in 2007.
  warmup_min_train_rows: 400
  # Inclusive [start, end] sale-year range flagged as the downturn regime for
  # coverage-collapse and drawdown reporting. Ames peaked in 2007; prices then
  # softened through 2010 (a mild decline — the real magnitude is in the metric card).
  crash_window_years: [2008, 2010]
